<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bible App Support</title>
  <meta name="description" content="Bible App 的支持页面，包含隐私政策、用户协议与联系方式。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <section class="hero">
      <p class="eyebrow">Bible App</p>
      <h1>支持与法律信息</h1>
      <p class="lead">
        这里提供 Bible App 的支持方式、隐私政策和用户协议，便于用户查看，也可用于 App Store Connect 填写相关链接。
      </p>
    </section>

    <section class="card-grid">
      <article class="card">
        <h2>支持页面</h2>
        <p>如果你在使用 Bible App 过程中遇到问题，可以通过邮箱联系我们。</p>
        <a href="support.html">打开支持页面</a>

      <article class="card">
        <h2>隐私政策</h2>
        <p>了解 Bible App 如何处理用户信息，以及本应用当前不收集个人信息的说明。</p>
        <a href="privacy-policy.html">查看隐私政策</a>
      </article>

      <article class="card">
        <h2>用户协议</h2>
        <p>查看使用 Bible App 时适用的基础条款、免责声明和使用规范。</p>
        <a href="terms.html">查看用户协议</a>
      </article>
    </section>
  </main>

</html>
